server {
    listen 80;
    client_max_body_size 25m;

    # Docker embedded DNS — резолв upstream в рантайме, не при старте
    # (иначе nginx падает [emerg], если api/web ещё не подняты)
    resolver 127.0.0.11 valid=10s;

    location /api/ {
        set $upstream_api api:8000;
        proxy_pass http://$upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        set $upstream_ws api:8000;
        proxy_pass http://$upstream_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location / {
        set $upstream_web web:3000;
        proxy_pass http://$upstream_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
