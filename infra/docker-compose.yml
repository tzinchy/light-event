name: light-event

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-light_event}
      POSTGRES_USER: ${POSTGRES_USER:-light_event}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-light-event}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY in .env}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY:-light-event} $${S3_SECRET_KEY} &&
      mc mb --ignore-existing local/$${S3_BUCKET:-light-event}
      "
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-light-event}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?set S3_SECRET_KEY in .env}
      S3_BUCKET: ${S3_BUCKET:-light-event}

  api:
    profiles: ["full"]
    build:
      context: ../apps/api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-light_event}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-light_event}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-light-event}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-light-event}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      SMS_RU_API_KEY: ${SMS_RU_API_KEY:-}
      # SMTP как в .env: реальный провайдер; пустой SMTP_HOST — письма в лог (Console),
      # коды в любом случае видны в журнале админки («Письма»)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_FROM: ${SMTP_FROM:-light-event <no-reply@light-event.local>}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_YANDEX_MAPS_KEY: ${NEXT_PUBLIC_YANDEX_MAPS_KEY:-}
    depends_on:
      - api

  nginx:
    profiles: ["full"]
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api
      - web

  # прод: HTTPS-терминатор перед nginx; SITE_ADDRESS — домен или <ip>.sslip.io
  caddy:
    profiles: ["prod"]
    image: caddy:alpine
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?set SITE_ADDRESS in .env (домен или 1-2-3-4.sslip.io)}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - nginx

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
