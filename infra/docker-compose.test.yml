# Стенд для e2e (Playwright) — эфемерные данные, изолированные порты.
# Интеграционные тесты backend поднимают контейнеры сами (testcontainers).
name: light-event-test

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: light_event_test
      POSTGRES_USER: light_event
      POSTGRES_PASSWORD: test-only
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U light_event"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: light-event
      MINIO_ROOT_PASSWORD: test-only-minio
    tmpfs:
      - /data

  api:
    build:
      context: ../apps/api
    environment:
      DATABASE_URL: postgresql+asyncpg://light_event:test-only@db:5432/light_event_test
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: light-event
      S3_SECRET_KEY: test-only-minio
      S3_BUCKET: light-event
      APP_SECRET_KEY: test-only-secret
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8081:80"
    depends_on:
      - api
